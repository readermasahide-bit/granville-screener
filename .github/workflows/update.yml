name: Daily Granville Screener Auto Update

on:
  schedule:
    # 毎日 日本時間17:00 (世界標準時 08:00 UTC) に自動実行
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    # 手動で「今すぐ実行」ボタンを押すことも可能にする設定

permissions:
  contents: write # 生成されたHTMLをリポジトリに保存するために必要な権限

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Granville Screener
        run: |
          python app.py

      - name: Commit and Push Updated HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S') JST"
          git push
