name: AI Auto Logic Improver

on:
  # 毎週土曜日の 日本時間 20:00 (世界標準時 11:00 UTC) に自動実行
  schedule:
    - cron: '0 11 * * 6'
  # GitHubの「Actions」タブから、手動でいつでも「今すぐ実行」できるようにする設定
  workflow_dispatch:

jobs:
  improve-logic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1. リポジトリのコードを取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python環境のセットアップ（標準的な3.10を使用）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 必要なライブラリのインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests google-genai

      # 4. 自動改善スクリプトを実行（app.pyが更新され、ai_explanation.mdが生成されます）
      - name: Run Auto Improve Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python auto_improve.py

      # 5. コードに変更があった場合のみ、自動でプルリクエスト（PR）を作成する
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "style: AIによる判定ロジックの最適化"
          branch: ai-logic-improvement
          title: "🤖 [AI自動改善] ユーザーフィードバックに基づくロジックのブラッシュアップ"
          body-path: ai_explanation.md  # AIが生成した日本語の解説文章をPRの本文として適用します
          labels: |
            ai-improvement
            automated-pr
